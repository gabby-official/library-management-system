<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Loans</title>
</head>
<body>

<h1>My Loans</h1>

<p th:text="${error}" style="color:red;"></p>

<table>
  <tr>
    <th>Book</th>
    <th>Status</th>
  </tr>

  <tr th:each="loan : ${loans}">
    <td th:text="${loan.book.title}"></td>
    <td th:text="${loan.status}"></td>
  </tr>
</table>

</body>
</html>
